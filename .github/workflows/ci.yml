name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Compile scripts
        run: python -m compileall skills/together/scripts scripts src tests
      - name: Doctor
        run: python skills/together/scripts/doctor.py
      - name: Validate JSON
        run: python scripts/validate-json.py
      - name: Validate registry
        run: python scripts/validate-registry.py
      - name: Validate routing
        run: python scripts/validate-routing.py
      - name: Run tests
        run: pytest

